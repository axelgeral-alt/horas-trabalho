<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas de Trabalho</title>

    <!-- XLSX (local) -->
    <script src="xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #222;
        }

        body.dark {
            background: #1e1e1e;
            color: #eee;
        }

        /* ============================
           LAYOUT GERAL
        ============================ */
        #layout {
            display: flex;
            height: 100vh;
        }

        /* ============================
           BARRA LATERAL
        ============================ */
        #sidebar {
            width: 220px;
            background: #ffffff;
            border-right: 1px solid #ccc;
            padding: 20px;
            box-sizing: border-box;
        }

        body.dark #sidebar {
            background: #2a2a2a;
            border-right: 1px solid #444;
        }

        #sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            margin-bottom: 20px;
        }

        #sidebar button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        /* ============================
           ÁREA PRINCIPAL DESKTOP
        ============================ */
        #main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        #status-contagem {
            font-weight: bold;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        table th, table td {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: left;
        }

        body.dark table th, body.dark table td {
            border: 1px solid #555;
        }

        /* ============================
           POPUPS
        ============================ */
        .popup {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: #fff;
            padding: 20px;
            width: 300px;
        }

        body.dark .popup-content {
            background: #333;
            color: #eee;
        }

        /* ============================
           MODO ANDROID
        ============================ */
        #android-view {
            display: none;
            padding: 20px;
        }

        .android-hidden {
            display: none !important;
        }

        #android-btn-iniciar,
        #android-btn-parar,
        #android-btn-fechar {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            margin-bottom: 20px;
        }

        #android-cronometro {
            font-size: 48px;
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>

<body>

<div id="layout">

    <!-- ============================
         BARRA LATERAL
    ============================ -->
    <div id="sidebar">
        <h2>Menu</h2>

        <button onclick="iniciarRegisto()">Iniciar</button>
        <button onclick="pararRegisto()">Parar</button>
        <button onclick="abrirPopupManual()">Registo Manual</button>
        <button onclick="abrirPopupExportar()">Exportar Excel</button>
        <button onclick="exportarBackup()">Backup Manual</button>
        <button onclick="escolherPastaBackup()">Escolher Pasta Backup</button>
        <button id="toggleAutoBackupBtn" onclick="toggleAutoBackup()">Backup Automático</button>
        <button onclick="toggleDarkMode()">Modo Escuro</button>
    </div>

    <!-- ============================
         ÁREA PRINCIPAL DESKTOP
    ============================ -->
    <div id="main">

        <div id="status-contagem"></div>

        <h3>Valor Hora</h3>
        <input type="date" id="data-valor-hora">
        <input type="number" id="valor-hora" placeholder="€/hora">
        <button onclick="guardarValorHora()">Guardar</button>

        <h3>Filtro por Data</h3>
        <input type="date" id="filtro-data" onchange="filtrarPorData()">

        <h3>Registos</h3>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Início</th>
                    <th>Fim</th>
                    <th>Tempo</th>
                    <th>Arred.</th>
                    <th>Valor</th>
                    <th>Comentário</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabela-registos"></tbody>
        </table>

        <h3>Totais</h3>
        <div id="total-dia"></div>
        <div id="total-semana"></div>
        <div id="total-mes"></div>

    </div>
</div>

<!-- ============================
     MODO ANDROID
============================ -->
<div id="android-view" class="android-hidden">

    <button id="android-btn-iniciar" onclick="iniciarRegisto()">Iniciar</button>

    <div id="android-cronometro">00:00:00</div>

    <button id="android-btn-parar" class="android-hidden" onclick="pararRegisto()">Parar</button>

    <h3>Registos do Dia</h3>
    <div id="android-registos"></div>

    <h3>Total do Dia</h3>
    <div id="android-total-dia"></div>
    <div id="android-total-euros"></div>

    <button id="android-btn-fechar" onclick="fecharApp()">Fechar</button>
</div>

<!-- ============================
     POPUP — REGISTO MANUAL
============================ -->
<div id="popup-manual" class="popup">
    <div class="popup-content">
        <h3>Registo Manual</h3>
        <input type="date" id="manual-data"><br><br>
        <input type="time" id="manual-inicio"><br><br>
        <input type="time" id="manual-fim"><br><br>
        <textarea id="manual-comentario" placeholder="Comentário"></textarea><br><br>
        <button onclick="guardarRegistoManual()">Guardar</button>
        <button onclick="fecharPopupManual()">Fechar</button>
    </div>
</div>

<!-- ============================
     POPUP — EXPORTAR
============================ -->
<div id="popup-exportar" class="popup">
    <div class="popup-content">
        <h3>Exportar Excel</h3>

        <button onclick="exportarPeriodo('hoje')">Hoje</button>
        <button onclick="exportarPeriodo('semana')">Semana</button>
        <button onclick="exportarPeriodo('mes')">Mês</button>
        <button onclick="exportarPeriodo('ano')">Ano</button>

        <hr>

        <input type="date" id="exportar-de">
        <input type="date" id="exportar-ate">
        <button onclick="exportarExcelComFiltro()">Exportar</button>

        <button onclick="fecharPopupExportar()">Fechar</button>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
